name: Deploy (template)

on:
  workflow_dispatch:

jobs:
  deploy-backend-cloudrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
      - name: Build & push container
        run: |
          cd backend
          gcloud builds submit --tag gcr.io/${{ secrets.FIREBASE_PROJECT_ID }}/profitpilot-backend:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy profitpilot-backend --image gcr.io/${{ secrets.FIREBASE_PROJECT_ID }}/profitpilot-backend:latest --region=us-central1 --platform=managed --allow-unauthenticated --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}"

  deploy-frontend-hosting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Firebase CLI
        uses: w9jds/firebase-action@v2
        with:
          args: version
      - name: Build Next app
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          npx firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}

# NOTE: This is a TEMPLATE. Review and adapt the commands for your preferred hosting choices and security requirements.
